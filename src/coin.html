<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CoinWatch — coin detail page with price history chart and key market stats."
    />
    <title>CoinWatch — Coin Detail</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/coin.js"></script>
  </head>
  <body>
    <!-- Header partial is injected here on load -->
    <div id="main-header"></div>

    <main class="container detail-main" id="main">
      <p class="back-link-row">
        <a class="back-link" href="./index.html">&larr; Back to dashboard</a>
      </p>

      <!-- Status region: loading spinner / error message -->
      <div id="status" class="status" role="status" aria-live="polite"></div>

      <!-- Coin header (logo, name, symbol, rank, price, 24h change) -->
      <section id="coin-header" class="coin-header" aria-label="Coin overview"></section>

      <!-- Price chart + range controls -->
      <section class="chart-section" aria-label="Price history chart">
        <div class="range-row">
          <div class="range-group" role="group" aria-label="Chart time range">
            <button type="button" class="range-btn" data-days="7" aria-pressed="false">7D</button>
            <button type="button" class="range-btn" data-days="30" aria-pressed="true">30D</button>
            <button type="button" class="range-btn" data-days="90" aria-pressed="false">90D</button>
          </div>
          <div id="chart-status" class="chart-status muted"></div>
        </div>
        <div class="chart-container">
          <canvas id="price-chart" aria-label="Price history line chart"></canvas>
        </div>
      </section>

      <!-- Market stats grid -->
      <section id="coin-stats" class="detail-stats" aria-label="Market statistics"></section>

      <!-- Description -->
      <section id="coin-description" class="detail-description" aria-label="About this coin"></section>
    </main>

    <!-- Footer partial is injected here on load -->
    <div id="main-footer"></div>
  </body>
</html>
