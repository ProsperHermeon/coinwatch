<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CoinWatch — a live cryptocurrency market dashboard with a personal watchlist."
    />
    <title>CoinWatch — Live Crypto Market Tracker</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: Space Grotesk (brand/headings), Inter (UI), Roboto Mono (numbers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/main.js"></script>
  </head>
  <body>
    <!-- Header partial is injected here on load -->
    <div id="main-header"></div>

    <main class="container" id="main">
      <section class="dashboard-intro">
        <h1>Live Market</h1>
        <p class="muted">
          Top 25 coins by market cap, updated each time you load the page. Star a coin to add
          it to your watchlist.
        </p>
      </section>

      <section class="controls" aria-label="Dashboard controls">
        <label class="search">
          <span class="visually-hidden">Search coins</span>
          <input
            id="search-input"
            type="search"
            placeholder="Search by name or symbol…"
            autocomplete="off"
            aria-label="Search coins by name or symbol"
          />
        </label>

        <div class="control-row">
          <div class="filter-group" role="group" aria-label="Filter coins">
            <button type="button" class="filter-btn" data-filter="all" aria-pressed="true">
              All
            </button>
            <button type="button" class="filter-btn" data-filter="gainers" aria-pressed="false">
              Gainers
            </button>
            <button type="button" class="filter-btn" data-filter="losers" aria-pressed="false">
              Losers
            </button>
            <button
              type="button"
              class="filter-btn"
              data-filter="watchlist"
              aria-pressed="false"
            >
              Watchlist
            </button>
          </div>

          <label class="select-field">
            <span class="select-label">Sort by</span>
            <select id="sort-select" aria-label="Sort coins">
              <option value="market_cap">Market cap</option>
              <option value="price">Price</option>
              <option value="change_24h">24h change</option>
              <option value="name">Name</option>
            </select>
          </label>

          <label class="select-field">
            <span class="select-label">Currency</span>
            <select id="currency-select" aria-label="Display currency">
              <option value="usd">USD</option>
              <option value="eur">EUR</option>
              <option value="gbp">GBP</option>
            </select>
          </label>
        </div>
      </section>

      <!-- Status region: loading spinner / error / empty messages -->
      <div id="status" class="status" role="status" aria-live="polite"></div>

      <!-- Coin cards are rendered into this grid -->
      <section
        id="coin-grid"
        class="coin-grid"
        aria-label="Cryptocurrency market list"
      ></section>
    </main>

    <!-- Footer partial is injected here on load -->
    <div id="main-footer"></div>
  </body>
</html>
